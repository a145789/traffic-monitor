name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      - name: Build release
        run: cargo build --release

      - name: Cache Inno Setup
        id: cache-is
        uses: actions/cache@v4
        with:
          path: |
            C:\Program Files\Inno Setup 7
            C:\Program Files (x86)\Inno Setup 7
            C:\Program Files (x86)\Inno Setup 6
          key: innosetup-7-v1

      - name: Install Inno Setup
        if: steps.cache-is.outputs.cache-hit != 'true'
        run: choco install innosetup -y

      - name: Download Chinese language file
        if: steps.cache-is.outputs.cache-hit != 'true'
        run: |
          $candidatePaths = @(
            "C:\Program Files\Inno Setup 7",
            "C:\Program Files (x86)\Inno Setup 7",
            "C:\Program Files (x86)\Inno Setup 6"
          )
          $innoPath = ""
          foreach ($path in $candidatePaths) {
            if (Test-Path "$path\ISCC.exe") {
              $innoPath = $path
              break
            }
          }
          if (-not $innoPath) {
            $isccCmd = Get-Command ISCC.exe -ErrorAction SilentlyContinue
            if ($isccCmd) {
              $innoPath = Split-Path -Parent $isccCmd.Source
            }
          }
          if (-not $innoPath) {
            Write-Error "Inno Setup not found!"
            exit 1
          }
          $langDir = Join-Path $innoPath "Languages"
          if (-not (Test-Path $langDir)) {
            New-Item -ItemType Directory -Force -Path $langDir
          }
          $url = "https://raw.githubusercontent.com/jrsoftware/issrc/refs/heads/main/Files/Languages/Unofficial/ChineseSimplified.isl"
          Invoke-WebRequest -Uri $url -OutFile (Join-Path $langDir "ChineseSimplified.isl") -UseBasicParsing

      - name: Compile installer
        run: |
          $candidatePaths = @(
            "C:\Program Files\Inno Setup 7",
            "C:\Program Files (x86)\Inno Setup 7",
            "C:\Program Files (x86)\Inno Setup 6"
          )
          $iscc = ""
          foreach ($path in $candidatePaths) {
            if (Test-Path "$path\ISCC.exe") {
              $iscc = "$path\ISCC.exe"
              break
            }
          }
          if (-not $iscc) {
            $isccCmd = Get-Command ISCC.exe -ErrorAction SilentlyContinue
            if ($isccCmd) {
              $iscc = $isccCmd.Source
            }
          }
          if (-not $iscc) {
            Write-Error "ISCC.exe not found!"
            exit 1
          }
          & $iscc installer.iss

      - name: Rename installer
        shell: bash
        run: |
          mv Output/TrafficMonitor-Setup.exe Output/TrafficMonitor-Setup-${{ steps.version.outputs.VERSION }}.exe

      - name: Generate version.txt
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          INSTALLER="Output/TrafficMonitor-Setup-${VERSION}.exe"
          HASH=$(sha256sum "$INSTALLER" | cut -d' ' -f1 | tr 'a-z' 'A-Z')
          printf "%s\n%s\n" "$VERSION" "$HASH" > version.txt

      - name: Upload to Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${{ github.ref_name }}" &>/dev/null; then
            echo "Release ${{ github.ref_name }} not found. Creating it..."
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
          else
            echo "Release ${{ github.ref_name }} already exists."
          fi

          gh release upload "${{ github.ref_name }}" \
            "target/release/traffic-monitor.exe#traffic-monitor.exe" \
            "Output/TrafficMonitor-Setup-${{ steps.version.outputs.VERSION }}.exe#TrafficMonitor-Setup-${{ steps.version.outputs.VERSION }}.exe" \
            "version.txt#version.txt" \
            --clobber
